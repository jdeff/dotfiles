# ~/.config/tmux/tmux.conf
# Modern tmux: prefix stays C-b. Plugins via TPM (auto-bootstrapped by
# install.sh). Status bar is hand-rolled in Kanagawa colors.

# ── Terminal & truecolor ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"        # 24-bit color (Ghostty supports it)
set -g focus-events on                    # let nvim see focus (autoread, etc.)
set -sg escape-time 0                     # no lag on <Esc> in nvim
set -g history-limit 50000
set -g display-time 2000                  # messages linger 2s
set -g set-clipboard on

# ── Sane indexing ───────────────────────────────────────────────────────────
set -g base-index 1                       # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                # keep window numbers gapless
set -g mouse on

# ── vi everywhere (matches zsh + nvim) ──────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi

# ── Keybindings ──────────────────────────────────────────────────────────────
# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Intuitive splits that inherit the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Resize panes with prefix + H/J/K/L (repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching.
bind -r p previous-window
bind -r n next-window
bind Tab last-window

# copy-mode: visual-style selection, y to yank (clipboard via tmux-yank).
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Plugins (TPM) ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'              # y in copy-mode -> system clipboard
set -g @plugin 'sainnhe/tmux-fzf'                    # prefix + F: fuzzy menu
set -g @plugin 'christoomey/vim-tmux-navigator'      # C-h/j/k/l across nvim + tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'         # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'         # automate resurrect

# Session persistence: auto-restore on start, save every 15 min, keep contents.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Kanagawa-flavored status bar ─────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# Palette (Kanagawa Wave)
%hidden BG="#1f1f28"
%hidden FG="#dcd7ba"
%hidden GREY="#54546d"
%hidden BLUE="#7e9cd8"
%hidden GREEN="#98bb6c"
%hidden YELLOW="#e6c384"
%hidden RED="#e82424"

set -g status-style "bg=$BG,fg=$FG"
set -g pane-border-style "fg=$GREY"
set -g pane-active-border-style "fg=$BLUE"
set -g message-style "bg=$YELLOW,fg=$BG"
set -g mode-style "bg=$BLUE,fg=$BG"

# Left: session name. Right: date + time. Prefix indicator turns the session
# segment yellow while the prefix is active.
set -g status-left-length 30
set -g status-left "#[bg=#{?client_prefix,$YELLOW,$BLUE},fg=$BG,bold] #S #[bg=$BG,fg=$BG] "
set -g status-right-length 60
set -g status-right "#[fg=$GREY]%a %d %b #[fg=$FG]%H:%M "

# Windows: active gets the blue accent, others muted.
setw -g window-status-format "#[fg=$GREY] #I #W "
setw -g window-status-current-format "#[bg=$GREEN,fg=$BG,bold] #I #W "
setw -g window-status-separator ""

# Initialize TPM — keep this line last.
run '~/.config/tmux/plugins/tpm/tpm'
