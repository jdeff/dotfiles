# ~/.config/tmux/tmux.conf
# Modern tmux: prefix stays C-b. Plugins via TPM (auto-bootstrapped by
# install.sh). Status bar is hand-rolled in Kanagawa colors.

# ── Terminal & truecolor ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"        # 24-bit color (Ghostty supports it)
set -g focus-events on                    # let nvim see focus (autoread, etc.)
set -sg escape-time 0                     # no lag on <Esc> in nvim
set -g history-limit 50000
set -g display-time 2000                  # messages linger 2s
set -g set-clipboard on

# ── Sane indexing ───────────────────────────────────────────────────────────
set -g base-index 1                       # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on                # keep window numbers gapless
set -g mouse on

# ── Pane titles ─────────────────────────────────────────────────────────────
# workmux names windows (wm-<handle>) but not panes. Show each pane's program
# (ruby, node, nvim…), or a title a program sets itself (e.g. Claude Code's
# task line). Active pane is bold.
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[bold],}#{pane_index}: #{?#{||:#{==:#{pane_title},#{host}},#{==:#{pane_title},}},#{pane_current_command},#{pane_title}}#[default] "

# ── vi everywhere (matches zsh + nvim) ──────────────────────────────────────
setw -g mode-keys vi
set -g status-keys vi

# ── Keybindings ──────────────────────────────────────────────────────────────
# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux config reloaded"

# Intuitive splits that inherit the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Resize panes with prefix + H/J/K/L (repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching.
bind -r p previous-window
bind -r n next-window
bind Tab last-window

# copy-mode: visual-style selection, y to yank (clipboard via tmux-yank).
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── workmux ──────────────────────────────────────────────────────────────────
# Dashboard in a popup ("dialog"). -E closes it on exit; jumping to an agent
# switches the client and tears the popup down. The dashboard detects the
# originating pane via the multiplexer, so it works correctly from a popup.
# Absolute path: the tmux server's PATH doesn't include ~/.local/bin, so a bare
# "workmux" isn't found inside popups/run-shell. /bin/sh expands $HOME at runtime.
bind C-d display-popup -w 120 -h 36 -E "$HOME/.local/bin/workmux dashboard"
bind C-w display-popup -w 120 -h 36 -E "$HOME/.local/bin/workmux dashboard --tab worktrees"

# Sidebar is a persistent split pane, not a popup — toggle it with run-shell.
# (prefix + C-s is taken by tmux-resurrect, so the toggle lives on prefix + b.)
bind b run-shell "$HOME/.local/bin/workmux sidebar"

# Cycle / jump the sidebar's focused agent, no prefix needed.
bind -n M-j run-shell "$HOME/.local/bin/workmux sidebar next"
bind -n M-k run-shell "$HOME/.local/bin/workmux sidebar prev"
bind -n M-1 run-shell "$HOME/.local/bin/workmux sidebar jump 1"
bind -n M-2 run-shell "$HOME/.local/bin/workmux sidebar jump 2"
bind -n M-3 run-shell "$HOME/.local/bin/workmux sidebar jump 3"

# prefix w enters a key-table, letters matching the wm* shell aliases:
#   a add (prompts for branch) · m merge · r remove · o open (prompts for name) ·
#   c close · l list · d dashboard · s sidebar toggle
# (Stock prefix-w window picker moves to capital W; prefix s already covers
# session switching.) Same popup pattern as hotseat below: popups run in the
# focused pane's dir so workmux infers the worktree from cwd, and commands with
# output worth reading pause for enter before the popup closes.
bind W choose-tree -Zw
bind w switch-client -T workmux
bind -T workmux a command-prompt -p "workmux add:" "display-popup -E -w 80% -h 60% -d \"#{pane_current_path}\" \"$HOME/.local/bin/workmux add '%%'; printf '\\n— enter —'; read _\""
bind -T workmux m display-popup -E -w 80% -h 60% -d "#{pane_current_path}" \
  "$HOME/.local/bin/workmux merge; printf '\n— enter —'; read _"
bind -T workmux r display-popup -E -w 80% -h 60% -d "#{pane_current_path}" \
  "$HOME/.local/bin/workmux remove; printf '\n— enter —'; read _"
bind -T workmux o command-prompt -p "workmux open:" "display-popup -E -w 80% -h 60% -d \"#{pane_current_path}\" \"$HOME/.local/bin/workmux open '%%'; printf '\\n— enter —'; read _\""
bind -T workmux c display-popup -E -d "#{pane_current_path}" \
  "$HOME/.local/bin/workmux close || { printf '\n— enter —'; read _; }"
bind -T workmux l display-popup -E -w 80% -h 60% -d "#{pane_current_path}" \
  "$HOME/.local/bin/workmux list; printf '\n— enter —'; read _"
bind -T workmux d display-popup -w 120 -h 36 -E "$HOME/.local/bin/workmux dashboard"
bind -T workmux s run-shell "$HOME/.local/bin/workmux sidebar"

# ── hotseat ───────────────────────────────────────────────────────────────────
# prefix h enters a key-table; then one letter:
#   m menu (fzf palette) · g go-to-session · u up · d down · s status · k lazydocker
# (lowercase h — capital H is resize-pane -L above.)
# Popups set HOTSEAT_WORKMUX (the tmux server PATH lacks ~/.local/bin) and run in
# the focused pane's dir so hotseat can infer the project/feature from cwd. `g` is
# pure tmux (no project needed); `m` always works (picks the project itself).
bind h switch-client -T hotseat
bind -T hotseat g choose-tree -Zs -f '#{m:hotseat-*,#{session_name}}'
bind -T hotseat m display-popup -E -w 80% -h 75% -d "#{pane_current_path}" \
  "HOTSEAT_WORKMUX=$HOME/.local/bin/workmux $HOME/.local/bin/hotseat menu"
bind -T hotseat u display-popup -E -w 90% -h 80% -d "#{pane_current_path}" \
  "HOTSEAT_WORKMUX=$HOME/.local/bin/workmux $HOME/.local/bin/hotseat up; printf '\n— enter —'; read _"
bind -T hotseat d display-popup -E -w 80% -h 50% -d "#{pane_current_path}" \
  "HOTSEAT_WORKMUX=$HOME/.local/bin/workmux $HOME/.local/bin/hotseat down; printf '\n— enter —'; read _"
bind -T hotseat s display-popup -E -w 80% -h 60% -d "#{pane_current_path}" \
  "HOTSEAT_WORKMUX=$HOME/.local/bin/workmux $HOME/.local/bin/hotseat status; printf '\n— enter —'; read _"
bind -T hotseat k display-popup -E -d "#{pane_current_path}" \
  "HOTSEAT_WORKMUX=$HOME/.local/bin/workmux $HOME/.local/bin/hotseat docker"

# ── Plugins (TPM) ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'              # y in copy-mode -> system clipboard
set -g @plugin 'sainnhe/tmux-fzf'                    # prefix + F: fuzzy menu
set -g @plugin 'christoomey/vim-tmux-navigator'      # C-h/j/k/l across nvim + tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'         # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'         # automate resurrect
set -g @plugin 'erikw/tmux-dark-notify'              # follow macOS light/dark (event-driven, via dark-notify)

# Session persistence: auto-restore on start, save every 15 min, keep contents.
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-dark-notify: which theme to source for each macOS appearance. The plugin
# runs dark-notify(1) in the background and re-sources the matching file the
# instant the system flips light/dark — replacing the old status-line poll.
set -g @dark-notify-theme-path-dark  '$HOME/.config/tmux/themes/wave.conf'
set -g @dark-notify-theme-path-light '$HOME/.config/tmux/themes/lotus.conf'

# ── Status bar ───────────────────────────────────────────────────────────────
# Structure here; colors + segment formats live in themes/{wave,lotus}.conf and
# auto-swap with the macOS appearance via the tmux-dark-notify plugin (above),
# which re-sources the matching theme on change — no polling.
set -g status-position bottom
# One-row transparent gap between the panes and the status bar. With
# status-position bottom, lower indices sit higher on screen, so [0] is the
# spacer (directly under the panes) and [1] is the real bar at the screen
# bottom. status-format[1] is tmux's stock status-format[0] verbatim, just
# relocated down a row; it still references status-left/right + the window list.
set -g status 2
# [0] is a transparent spacer drawn as a thin horizontal rule (box-drawing
# U+2500). The run of glyphs is clipped to the terminal width by tmux; the rule
# color comes from @rule_style, set per-theme in themes/{wave,lotus}.conf.
set -g status-format[0] "#[bg=default #{E:@rule_style}]────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────"
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-interval 5
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 100
setw -g window-status-separator ""

# Initialize TPM (starts tmux-dark-notify's background watcher).
run '~/.config/tmux/plugins/tpm/tpm'

# Apply the last-known theme immediately on start; tmux-dark-notify re-sources
# the correct one the instant the appearance next changes. The state symlink
# only exists once the plugin has run at least once, so on a brand-new machine
# the theme lands a beat later when dark-notify first fires.
if-shell "test -e ~/.local/state/tmux/tmux-dark-notify-theme.conf" \
  "source-file ~/.local/state/tmux/tmux-dark-notify-theme.conf"
