# Kanagawa Lotus (light) ÔÇö sourced by scripts/theme.sh in light mode.
%hidden BG="#f2ecbc"
%hidden FG="#545464"
%hidden GREY="#8a8980"
%hidden BLUE="#4d699b"
%hidden GREEN="#6f894e"
%hidden YELLOW="#de9800"
%hidden LIGHT="#f2ecbc"

set -g status-style "bg=${BG},fg=${FG}"
set -g pane-border-style "fg=${GREY}"
set -g pane-active-border-style "fg=${BLUE}"
set -g @rule_style "fg=${GREY}"           # status-bar spacer rule (tmux.conf status-format[0])
set -g message-style "bg=${YELLOW},fg=${LIGHT}"
set -g mode-style "bg=${BLUE},fg=${LIGHT}"

# Accent segments use the light bg color as fg for contrast on light themes.
set -g status-left "#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]¯éÂ#[bg=#{?client_prefix,${YELLOW},${BLUE}},fg=${LIGHT},bold]#S#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]¯é┤ "
set -g status-right "#[fg=${YELLOW}]#(~/.config/tmux/scripts/theme.sh) #[fg=${GREY}]%a %d %b #[fg=${FG}]%H:%M "

setw -g window-status-format "#[fg=${GREY}] #I #W "
setw -g window-status-current-format "#[fg=${GREEN},bg=${BG}]¯éÂ#[bg=${GREEN},fg=${LIGHT},bold]#I #W#[fg=${GREEN},bg=${BG}]¯é┤"
