# Kanagawa Lotus (light) вЂ” sourced by tmux-dark-notify when macOS is in light mode.
%hidden BG="#f2ecbc"
%hidden FG="#545464"
%hidden GREY="#8a8980"
%hidden BLUE="#4d699b"
%hidden GREEN="#6f894e"
%hidden YELLOW="#de9800"
%hidden VIOLET="#5d57a3"                   # hotseat status block (distinct from GREEN active tab)
%hidden LIGHT="#f2ecbc"

set -g status-style "bg=${BG},fg=${FG}"
set -g pane-border-style "fg=${GREY}"
set -g pane-active-border-style "fg=${BLUE}"
set -g @rule_style "fg=${GREY}"           # status-bar spacer rule (tmux.conf status-format[0])
set -g message-style "bg=${YELLOW},fg=${LIGHT}"
set -g mode-style "bg=${BLUE},fg=${LIGHT}"

# Accent segments use the light bg color as fg for contrast on light themes.
set -g status-left "#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]о‚¶#[bg=#{?client_prefix,${YELLOW},${BLUE}},fg=${LIGHT},bold]#S#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]о‚ґ "
# hotseat (live dev stack, blank when none) + now-playing + date + time.
# hotseat sets #{@hotseat_status} (e.g. "tms:demo") on up/down вЂ” like @workmux_status.
set -g status-right "#{?@hotseat_status,#[bg=${LIGHT}]#[fg=${VIOLET}]о‚¶#[bg=${VIOLET}]#[fg=${LIGHT}]#[bold]у°ђЌ #{@hotseat_status} #[bg=${LIGHT}]#[fg=${VIOLET}]о‚ґ#[default],#[fg=${GREY}]  } #[fg=${BLUE}]#(~/.config/tmux/scripts/now-playing.sh)#[fg=${GREY}]%a %d %b #[fg=${FG}]%H:%M "

# #{@workmux_status} is set per-window by workmux (status_format:false keeps it
# from rewriting these formats itself); the ?cond renders nothing on non-agent
# windows. Glyphs come from workmux/config.yaml; their color lives here.
setw -g window-status-format "#[fg=${GREY}] #I #W#{?@workmux_status,#[fg=${YELLOW}] #{@workmux_status}#[fg=${GREY}],} "
setw -g window-status-current-format "#[fg=${GREEN},bg=${BG}]о‚¶#[bg=${GREEN},fg=${LIGHT},bold]#I #W#{?@workmux_status, #{@workmux_status},}#[fg=${GREEN},bg=${BG}]о‚ґ"
