# Kanagawa Wave (dark) â€” sourced by tmux-dark-notify when macOS is in dark mode.
%hidden BG="#1f1f28"
%hidden FG="#dcd7ba"
%hidden GREY="#54546d"
%hidden BLUE="#7e9cd8"
%hidden GREEN="#98bb6c"
%hidden YELLOW="#e6c384"

set -g status-style "bg=${BG},fg=${FG}"
set -g pane-border-style "fg=${GREY}"
set -g pane-active-border-style "fg=${BLUE}"
set -g @rule_style "fg=${GREY}"           # status-bar spacer rule (tmux.conf status-format[0])
set -g message-style "bg=${YELLOW},fg=${BG}"
set -g mode-style "bg=${BLUE},fg=${BG}"

# Left: session name (turns yellow while the prefix is held).
set -g status-left "#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]î‚¶#[bg=#{?client_prefix,${YELLOW},${BLUE}},fg=${BG},bold]#S#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]î‚´ "
# Right: now-playing (Apple Music, blank when nothing's playing) + date + time.
set -g status-right "#[fg=${BLUE}]#(~/.config/tmux/scripts/now-playing.sh)#[fg=${GREY}]%a %d %b #[fg=${FG}]%H:%M "

setw -g window-status-format "#[fg=${GREY}] #I #W "
setw -g window-status-current-format "#[fg=${GREEN},bg=${BG}]î‚¶#[bg=${GREEN},fg=${BG},bold]#I #W#[fg=${GREEN},bg=${BG}]î‚´"
