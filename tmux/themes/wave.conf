# Kanagawa Wave (dark) ÔÇö sourced by tmux-dark-notify when macOS is in dark mode.
%hidden BG="#1f1f28"
%hidden FG="#dcd7ba"
%hidden GREY="#54546d"
%hidden BLUE="#7e9cd8"
%hidden GREEN="#98bb6c"
%hidden YELLOW="#e6c384"
%hidden VIOLET="#957fb8"                   # hotseat status block (distinct from GREEN active tab)

set -g status-style "bg=${BG},fg=${FG}"
set -g pane-border-style "fg=${GREY}"
set -g pane-active-border-style "fg=${BLUE}"
set -g @rule_style "fg=${GREY}"           # status-bar spacer rule (tmux.conf status-format[0])
set -g message-style "bg=${YELLOW},fg=${BG}"
set -g mode-style "bg=${BLUE},fg=${BG}"

# Left: session name (turns yellow while the prefix is held).
set -g status-left "#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]¯éÂ#[bg=#{?client_prefix,${YELLOW},${BLUE}},fg=${BG},bold]#S#[fg=#{?client_prefix,${YELLOW},${BLUE}},bg=${BG}]¯é┤ "
# Right: hotseat (live dev stack, blank when none) + now-playing + date + time.
# hotseat sets #{@hotseat_status} (e.g. "tms:demo") on up/down ÔÇö like @workmux_status.
set -g status-right "#{?@hotseat_status,#[bg=${BG}]#[fg=${VIOLET}]¯éÂ#[bg=${VIOLET}]#[fg=${BG}]#[bold]¾░Éì #{@hotseat_status} #[bg=${BG}]#[fg=${VIOLET}]¯é┤#[default],#[fg=${GREY}]  } #[fg=${BLUE}]#(~/.config/tmux/scripts/now-playing.sh)#[fg=${GREY}]%a %d %b #[fg=${FG}]%H:%M "

# #{@workmux_status} is set per-window by workmux (status_format:false keeps it
# from rewriting these formats itself); the ?cond renders nothing on non-agent
# windows. Glyphs come from workmux/config.yaml; their color lives here.
setw -g window-status-format "#[fg=${GREY}] #I #W#{?@workmux_status,#[fg=${YELLOW}] #{@workmux_status}#[fg=${GREY}],} "
setw -g window-status-current-format "#[fg=${GREEN},bg=${BG}]¯éÂ#[bg=${GREEN},fg=${BG},bold]#I #W#{?@workmux_status, #{@workmux_status},}#[fg=${GREEN},bg=${BG}]¯é┤"
