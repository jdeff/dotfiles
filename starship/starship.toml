# Starship prompt — https://starship.rs/config/
# A two-line, git-aware prompt with vi-mode indicator on the prompt character.

add_newline = true

format = """
${custom.directory}\
${custom.worktree}\
$git_branch\
$git_status\
$git_state\
$nodejs\
$ruby\
$cmd_duration\
$line_break\
$character"""

# ── Worktree-aware directory ─────────────────────────────────────────────
# The built-in directory module can't tell a linked git worktree from a
# normal checkout, so a workmux worktree renders as `mg-42 on MG-42` — pure
# redundancy, since the worktree dir is named after its branch (an open
# starship gap, see starship#7219). These two custom modules replace
# $directory. Exactly one fires per prompt: a dir is a linked worktree iff
# --git-dir differs from --git-common-dir (--path-format=absolute, because
# in subdirs the two otherwise disagree on relative vs absolute form). The
# worktree module re-roots the displayed path at the *main* checkout's name
# (derived from the common dir, so it works for any worktree, not just
# workmux ones): `tms-api (worktree) on MG-42`. Both replicate the old
# directory display rules — ~ contraction, last-3-component truncation,
# cut at the repo root — so the prompt is unchanged outside worktrees.

[custom.directory]
when = '[ "$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)" = "$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)" ]'
command = '''
top=$(git rev-parse --show-toplevel 2>/dev/null)
if [ -n "$top" ]; then
  rel=$(git rev-parse --show-prefix); rel=${rel%/}
  p="${top##*/}${rel:+/$rel}"
else
  case $PWD in
    "$HOME") p='~' ;;
    "$HOME"/*) p="~${PWD#"$HOME"}" ;;
    *) p=$PWD ;;
  esac
fi
printf '%s' "$p" | awk -F/ '{n=NF<3?NF:3; for(i=NF-n+1;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}'
'''
shell = ['sh']
style = "bold cyan"
format = '[$output]($style) '

[custom.worktree]
when = '[ "$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)" != "$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)" ]'
command = '''
common=$(git rev-parse --path-format=absolute --git-common-dir)
main=${common%/.git}; main=${main##*/}
rel=$(git rev-parse --show-prefix); rel=${rel%/}
printf '%s' "$main${rel:+/$rel}" | awk -F/ '{n=NF<3?NF:3; for(i=NF-n+1;i<=NF;i++) printf "%s%s", $i, (i<NF?"/":"")}'
'''
shell = ['sh']
style = "bold cyan"
format = '[$output]($style)[ 󰔱](dimmed) '

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
# Compact counts: ahead/behind, staged (+), modified (!), untracked (?), etc.
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "[+${count}](green)"
modified = "[!${count}](yellow)"
untracked = "[?${count}](blue)"
stashed = "[*${count}](cyan)"
deleted = "[✘${count}](red)"
conflicted = "[=${count}](red)"

[git_state]
style = "bold red"

[nodejs]
symbol = " "
style = "bold green"
# Show only inside projects with Node markers, to keep the prompt quiet.
detect_files = ["package.json", ".nvmrc", ".node-version"]

[ruby]
symbol = " "
style = "bold red"
detect_files = ["Gemfile", ".ruby-version"]
detect_extensions = ["rb"]

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

# ── Vi-mode indicator on the prompt character ────────────────────────────
# insert mode  -> green ❯   (success) / red ❯ (last command failed)
# normal mode  -> yellow ❮  (vimcmd)
# NOTE: zsh cannot report visual/replace mode to Starship (upstream limit),
# so those display the same as normal mode.
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
